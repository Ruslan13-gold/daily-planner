<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>День {{ date }}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .tasks-section {
            margin-top: 40px;
        }
        .tasks-section h2 {
            color: #34495e;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .task-list {
            list-style: none;
            padding: 0;
        }
        .task-item {
            background: #f9fbfc;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #3498db;
            display: flex;
            align-items: center;
        }
        .task-text {
            flex: 1;
            margin-left: 10px;
        }
        .task-done {
            color: #95a5a6;
            text-decoration: line-through;
        }
        .no-tasks {
            color: #7f8c8d;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }


        .task-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }

        .task-item {
            background: #f9fcff;
            padding: 14px 16px;
            margin-bottom: 12px;
            border-radius: 8px;
            border-left: 5px solid #3498db;
            display: flex;
            align-items: center;
            transition: all 0.18s ease;
        }

        .task-item:hover {
            background: #eef7ff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transform: translateX(4px);
        }

        .checkbox-btn {
            background: none;
            border: none;
            padding: 0;
            margin-right: 14px;
            cursor: pointer;
        }

        .checkbox {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 2.5px solid #3498db;
            border-radius: 50%;
            font-size: 20px;
            line-height: 23px;
            text-align: center;
            color: #3498db;
            background: white;
            transition: all 0.25s ease;
        }

        .checkbox.checked {
            background: #3498db;
            color: white;
            border-color: #2980b9;
        }

        .task-text {
            flex: 1;
            font-size: 1.08em;
        }

        .task-item.done .task-text {
            text-decoration: line-through;
            color: #7f8c8d;
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="/" class="back-link">← Назад к календарю</a>

        <h1>{{ date }}</h1>

        <div class="add-task-section" style="margin: 30px 0;">
            <h3>Добавить задачу</h3>
            <form method="POST" action="">
                <input type="text"
                       name="text"
                       placeholder="Например: Купить продукты"
                       required
                       style="width: 70%; padding: 10px; font-size: 1em;">
                <button type="submit"
                        style="padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">
                    Добавить
                </button>
            </form>
        </div>

        <div class="tasks-section">
            <h2>Задачи на день</h2>

            {% if tasks %}
                <ul class="task-list">
                    {% for task in tasks %}
                        <li class="task-item {% if task.done %}done{% endif %}">
                            <!-- Кликабельный чекбокс через скрытую форму -->
                            <form method="POST" action="{{ url_for('toggle_task', task_id=task.id) }}" style="display: inline;">
                                <button type="submit" class="checkbox-btn">
                                    <span class="checkbox {% if task.done %}checked{% endif %}">
                                        {% if task.done %}✓{% else %}○{% endif %}
                                    </span>
                                </button>
                            </form>

                            <span class="task-text">
                                {{ task.text }}
                            </span>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p class="no-tasks">На этот день задач пока нет. Добавьте первую!</p>
            {% endif %}
        </div>

        <p style="color: #6c757d; font-style: italic; margin-top: 40px;">
            Скоро здесь появится форма добавления задач и блок дневника
        </p>
    </div>

</body>
</html>
